<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h2>Formulário</h2>
    <form action="formulario.sql" method="post">
        <p>Nome: <input type="text" name="Nome" placeholder="Digite seu nome" size="50"/></p>

        <p>Telefone: <input type="tel" placeholder="00000000000" maxlength="11"/></p>

        <p>Data de Nascimento: <input type="date"/></p>

        <p>Senha: <input type="password" maxlength="16"/></p>

        <p>Email: <input type="email"/></p>

        <p>Idade: <input type="number"/></p>

        <p>Comentário:</p>
        <textarea rows="20" cols="20"></textarea>
        
        <!--Estrutura de Seleção-->
        <p>Time de Futebol:</p>
        <select>
            <option></option>
            <option value="Flamengo">Flamengo</option>
            <option value="Vasco">Vasco</option>
            <option value="Fluminense">Fluminense</option>
        </select>
    </form>
</body>
</html>
