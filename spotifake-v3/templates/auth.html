<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Spotifake — {% if page=='login' %}Entrar{% else %}Criar Conta{% endif %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
/* Animated background */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:float 8s ease-in-out infinite}
.bg-orb.o1{width:600px;height:600px;background:#1db954;top:-200px;left:-200px;animation-delay:0s}
.bg-orb.o2{width:500px;height:500px;background:#e91e8c;bottom:-150px;right:-150px;animation-delay:3s}
.bg-orb.o3{width:400px;height:400px;background:#0d73ec;top:30%;left:50%;animation-delay:5s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}
.noise{position:fixed;inset:0;z-index:1;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none}
/* Card */
.card{position:relative;z-index:10;background:rgba(18,18,18,0.85);backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:48px 40px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,0.6);animation:slideUp 0.5s cubic-bezier(.34,1.4,.64,1) both}
@keyframes slideUp{from{transform:translateY(32px);opacity:0}}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px;cursor:pointer}
.logo svg{color:#1db954}
.logo span{font-size:1.6rem;font-weight:900;letter-spacing:-0.5px}
h1{font-size:1.8rem;font-weight:900;text-align:center;margin-bottom:6px}
.sub{text-align:center;color:#a0a0a0;font-size:0.9rem;margin-bottom:28px}
.demo-hint{background:rgba(29,185,84,0.1);border:1px solid rgba(29,185,84,0.3);border-radius:10px;padding:12px 16px;font-size:0.82rem;color:#1db954;text-align:center;margin-bottom:20px}
.demo-hint strong{color:#1ed760}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:16px}
.field label{display:block;font-size:0.78rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.field .inp-wrap{position:relative}
.field .inp-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#555;font-size:0.9rem;pointer-events:none}
.field input{width:100%;padding:13px 14px 13px 40px;background:#1a1a1a;border:2px solid #2a2a2a;border-radius:10px;color:#fff;font-size:0.95rem;font-family:'Figtree',sans-serif;outline:none;transition:border-color .2s,background .2s}
.field input:focus{border-color:#1db954;background:#1f1f1f}
.field input::placeholder{color:#444}
.error{color:#ff5555;font-size:0.83rem;min-height:18px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.btn{width:100%;padding:15px;border-radius:500px;font-size:1rem;font-weight:800;cursor:pointer;border:none;font-family:'Figtree',sans-serif;transition:transform .15s,background .15s,box-shadow .15s;letter-spacing:0.3px}
.btn-green{background:#1db954;color:#000;box-shadow:0 4px 24px rgba(29,185,84,0.35)}
.btn-green:hover{background:#1ed760;transform:scale(1.02);box-shadow:0 8px 32px rgba(29,185,84,0.5)}
.btn-green:active{transform:scale(0.98)}
.btn-outline{background:transparent;color:#fff;border:2px solid #333;margin-top:12px}
.btn-outline:hover{border-color:#fff;background:rgba(255,255,255,0.05);transform:scale(1.01)}
.divider{display:flex;align-items:center;gap:14px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#2a2a2a}
.divider span{color:#555;font-size:0.8rem}
.switch{text-align:center;margin-top:16px;font-size:0.875rem;color:#777}
.switch a{color:#1db954;font-weight:700;cursor:pointer;text-decoration:none}
.switch a:hover{text-decoration:underline}
.spinner{display:none;width:20px;height:20px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .btn-text{display:none}
.btn.loading .spinner{display:block}
.strength{height:3px;background:#2a2a2a;border-radius:2px;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0%}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-orb o1"></div>
  <div class="bg-orb o2"></div>
  <div class="bg-orb o3"></div>
</div>
<div class="noise"></div>

<div class="card">
  <div class="logo" onclick="location='/'">
    <svg viewBox="0 0 24 24" fill="currentColor" width="36" height="36"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    <span>Spotifake</span>
  </div>

  {% if page == 'login' %}
  <h1>Bem-vindo de volta</h1>
  <p class="sub">Entre na sua conta para continuar ouvindo</p>
  <div class="demo-hint">Conta demo: <strong>demo</strong> / Senha: <strong>demo123</strong></div>
  <div class="field">
    <label>Usuário</label>
    <div class="inp-wrap"><i class="fas fa-user"></i><input type="text" id="username" placeholder="Seu nome de usuário" autocomplete="username"/></div>
  </div>
  <div class="field">
    <label>Senha</label>
    <div class="inp-wrap"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Sua senha" autocomplete="current-password"/></div>
  </div>
  <div class="error" id="loginError"></div>
  <button class="btn btn-green" id="loginBtn">
    <span class="btn-text">Entrar</span>
    <div class="spinner"></div>
  </button>
  <div class="divider"><span>ou</span></div>
  <a href="/register"><button class="btn btn-outline">Criar conta grátis</button></a>

  {% else %}
  <h1>Crie sua conta</h1>
  <p class="sub">É grátis e fácil</p>
  <div class="form-row">
    <div class="field">
      <label>Nome completo</label>
      <div class="inp-wrap"><i class="fas fa-id-card"></i><input type="text" id="name" placeholder="Seu nome" autocomplete="name"/></div>
    </div>
    <div class="field">
      <label>Usuário</label>
      <div class="inp-wrap"><i class="fas fa-at"></i><input type="text" id="username" placeholder="nome_usuario" autocomplete="username"/></div>
    </div>
  </div>
  <div class="field">
    <label>Email</label>
    <div class="inp-wrap"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/></div>
  </div>
  <div class="field">
    <label>Senha</label>
    <div class="inp-wrap"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/></div>
    <div class="strength"><div class="strength-fill" id="strengthFill"></div></div>
  </div>
  <div class="error" id="regError"></div>
  <button class="btn btn-green" id="regBtn">
    <span class="btn-text">Criar conta</span>
    <div class="spinner"></div>
  </button>
  <div class="switch">Já tem conta? <a href="/login">Entrar</a></div>
  {% endif %}
</div>

<script>
async function post(url, body) {
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  return r.json();
}

{% if page == 'login' %}
const btn = document.getElementById('loginBtn');
const errEl = document.getElementById('loginError');
async function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  errEl.innerHTML = '';
  if (!u || !p) { errEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Preencha todos os campos'; return; }
  btn.classList.add('loading');
  const r = await post('/api/auth/login', {username: u, password: p});
  btn.classList.remove('loading');
  if (r.error) { errEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${r.error}`; return; }
  window.location.href = '/';
}
btn.addEventListener('click', doLogin);
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

{% else %}
const btn = document.getElementById('regBtn');
const errEl = document.getElementById('regError');
const passInput = document.getElementById('password');
const fill = document.getElementById('strengthFill');
const colors = ['#ff4444','#ff8800','#ffcc00','#1db954'];
const labels = ['Fraca','Razoável','Boa','Forte'];
passInput.addEventListener('input', () => {
  const v = passInput.value;
  let s = 0;
  if (v.length >= 6) s++;
  if (v.length >= 10) s++;
  if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s++;
  fill.style.width = ((s+1)/4*100)+'%';
  fill.style.background = colors[s];
});
async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  errEl.innerHTML = '';
  if (!name || !username || !email || !password) { errEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Preencha todos os campos'; return; }
  btn.classList.add('loading');
  const r = await post('/api/auth/register', {name, username, email, password});
  btn.classList.remove('loading');
  if (r.error) { errEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${r.error}`; return; }
  window.location.href = '/';
}
btn.addEventListener('click', doRegister);
document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
{% endif %}
</script>
</body>
</html>
